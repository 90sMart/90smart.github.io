<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>90'sMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: #f2f4f7;
      color: #222;
    }

    /* App Name */
    .app-name {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 20px 0 10px;
      background: linear-gradient(90deg, #ff9900, #ff5e00);
      color: white;
    }

    /* Image Slider */
    .slider-container {
      width: 100%;
      overflow: hidden;
      position: relative;
      margin-top: 10px;
    }

    .slider {
      display: flex;
      width: 300%;
      animation: slide 12s infinite;
    }

    .slide {
      width: 100%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
    }

    @keyframes slide {
      0% { transform: translateX(0%); }
      33% { transform: translateX(0%); }
      40% { transform: translateX(-100%); }
      73% { transform: translateX(-100%); }
      80% { transform: translateX(-200%); }
      100% { transform: translateX(-200%); }
    }

    /* Content */
    .content {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px;
      text-align: center;
    }

    .tagline {
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 14px 0;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.2);
    }

    .open-btn {
      background: linear-gradient(135deg, #007bff, #0056d2);
    }

    .download-btn {
      background: linear-gradient(135deg, #28a745, #188d37);
    }

    .note {
      font-size: 13px;
      color: #777;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <!-- App Name -->
  <div class="app-name">90'sMart</div>

  <!-- Image Slider -->
  <div class="slider-container">
    <div class="slider">
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1586880244406-556ebe35f282" alt="Shopping">
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1607082350899-7e105aa886ae" alt="Groceries">
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1528701800489-20be3c2ea317" alt="Daily Needs">
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="tagline">
      Your everyday shopping, fast & simple
    </div>

    <!-- OPEN APP -->
    <a href="https://yourapp.flutterflow.app" class="btn open-btn">
      Open App
    </a>

    <!-- DOWNLOAD APK -->
    <a href="https://github.com/yourusername/yourrepo/releases/download/v0.0.1/Mart90s-release.apk"
       class="btn download-btn" download>
      Download App
    </a>

    <div class="note">
      After download, allow <b>Install from unknown source</b> on your device.
    </div>
  </div>

</body>
</html>
