<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>90's Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #ffffff;
      color: #222;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
    }

    .logo img {
      width: 60px;          /* adjust if needed */
      height: auto;
      display: block;
      background: none;     /* ✅ no background */
    }

    /* SLIDER */
    .slider-container {
      width: 100%;
      overflow: hidden;
    }

    .slider {
      display: flex;
      width: 200%;
      animation: slide 6s ease-in-out infinite;
    }

    .slide {
      width: 50%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      max-height: 180px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    @keyframes slide {
      0%   { transform: translateX(0%); }
      45%  { transform: translateX(0%); }
      50%  { transform: translateX(-50%); }
      95%  { transform: translateX(-50%); }
      100% { transform: translateX(0%); }
    }

    /* CONTENT */
    .content {
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px;
      text-align: center;
    }

    .tagline {
      font-size: 16px;
      color: #555;
      margin-bottom: 22px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      font-size: 17px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
    }

    .open-btn {
      background: #007bff;
    }

    .download-btn {
      background: #28a745;
    }

    .note {
      font-size: 13px;
      color: #777;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <img
        src="https://res.cloudinary.com/dqlr0jfdt/image/upload/v1776238427/kslshlqqkeoz3wa1h4fq.png"
        alt="90's Mart Logo"
      >
    </div>
  </div>

  <!-- SLIDER -->
  <div class="slider-container">
    <div class="slider">
      <div class="slide">
        <img src="https://res.cloudinary.com/dqlr0jfdt/image/upload/v1776236424/jp5js5xkonhtk3agxk03.jpg" alt="Banner 1">
      </div>
      <div class="slide">
        <img src="https://res.cloudinary.com/dqlr0jfdt/image/upload/v1776234952/rhe6cqzaddczfkjo7uuk.jpg" alt="Banner 2">
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="tagline">
      Your everyday shopping, fast & simple
    </div>

    <a href="https://yourapp.flutterflow.app" class="btn open-btn">
      Open App
    </a>

    <a href="https://github.com/yourusername/yourrepo/releases/download/v0.0.1/Mart90s-release.apk"
       class="btn download-btn">
      Download App
    </a>

    <div class="note">
      After download, allow <b>Install from unknown source</b>.
    </div>
  </div>

</body>
</html>
